<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup Form</title>
    <link rel="icon" type="image/x-icon" href="https://avatars.githubusercontent.com/u/246933677?s=400&u=4f58c2eb60cdb946561535ee71ddd52c4521addc&v=4">
    <link rel="stylesheet" href="assets/css/login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <script>
        const savedTheme = localStorage.getItem('beu_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>

<body>
    <!-- Theme Toggle Button -->
    <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">
        <i class="ti ti-sun" id="themeIcon"></i>
    </button>

    <!-- Background Pattern -->
    <div class="futuristic-pattern">
        <span class="ripple-overlay"></span>
        <svg class="texture-filter" style="display: none;">
            <filter id="advanced-texture">
                <feTurbulence result="noise" numOctaves="3" baseFrequency="0.7" type="fractalNoise"></feTurbulence>
                <feSpecularLighting result="specular" lighting-color="#fff" specularExponent="20" specularConstant="0.8" surfaceScale="2" in="noise">
                    <fePointLight z="100" y="50" x="50"></fePointLight>
                </feSpecularLighting>
                <feComposite result="litNoise" operator="in" in2="SourceGraphic" in="specular"></feComposite>
                <feBlend mode="overlay" in2="litNoise" in="SourceGraphic"></feBlend>
            </filter>
        </svg>
    </div>

    <div class="auth-wrapper">
        <div class="background-shape"></div>
        <div class="secondary-shape"></div>
        <div class="credentials-panel signin">
            <h2 class="slide-element">Login</h2>
            <form onsubmit="handleAuth(event)">
                <div class="field-wrapper slide-element">
                    <input type="text" required>
                    <label for="">Username</label>
                    <i class="ti ti-user"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <input type="password" required>
                    <label for="">Password</label>
                    <i class="ti ti-lock"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <button class="submit-button" type="submit">Login</button>
                </div>

                <div class="switch-link slide-element">
                    <p>Don't have an account? <br> <a href="#" class="register-trigger">Sign Up</a></p>
                </div>
            </form>
        </div>

        <div class="welcome-section signin">
            <h2 class="slide-element">WELCOME BACK!</h2>
        </div>

        <div class="credentials-panel signup">
            <h2 class="slide-element">Register</h2>
            <form onsubmit="handleAuth(event)">
                <div class="field-wrapper slide-element">
                    <input type="text" required>
                    <label for="">Username</label>
                    <i class="ti ti-user"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <input type="email" required>
                    <label for="">Email</label>
                    <i class="ti ti-mail"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <input type="password" required>
                    <label for="">Password</label>
                    <i class="ti ti-lock"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <button class="submit-button" type="submit">Register</button>
                </div>

                <div class="switch-link slide-element">
                    <p>Already have an account? <br> <a href="#" class="login-trigger">Sign In</a></p>
                </div>
            </form>
        </div>

        <div class="welcome-section signup">
            <h2 class="slide-element">WELCOME!</h2>
        </div>

    </div>
    <div class="footer">
        <p>Made with 🌿 By <a href="index.html">LearnBits</a></p>
    </div>


    <!-- Splash Screen Loader -->
    <div id="splash-loader" style="display: none; position: fixed; inset: 0; z-index: 99999; background: #0a0a0a; justify-content: center; align-items: center;">
        <div class="main-container" style="display: flex; justify-content: center; align-items: center; width: 100%; height: 100%;">
            <div class="loader" style="width: 100%; max-width: 800px; padding: 20px;">
                <svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="chipGradient" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2d2d2d"></stop><stop offset="100%" stop-color="#0f0f0f"></stop></linearGradient>
                        <linearGradient id="textGradient" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#eeeeee"></stop><stop offset="100%" stop-color="#888888"></stop></linearGradient>
                        <linearGradient id="pinGradient" x1="1" y1="0" x2="0" y2="0"><stop offset="0%" stop-color="#bbbbbb"></stop><stop offset="50%" stop-color="#888888"></stop><stop offset="100%" stop-color="#555555"></stop></linearGradient>
                    </defs>
                    <g id="traces">
                        <path d="M100 100 H200 V210 H326" class="trace-bg"></path><path d="M100 100 H200 V210 H326" class="trace-flow purple"></path>
                        <path d="M80 180 H180 V230 H326" class="trace-bg"></path><path d="M80 180 H180 V230 H326" class="trace-flow blue"></path>
                        <path d="M60 260 H150 V250 H326" class="trace-bg"></path><path d="M60 260 H150 V250 H326" class="trace-flow yellow"></path>
                        <path d="M100 350 H200 V270 H326" class="trace-bg"></path><path d="M100 350 H200 V270 H326" class="trace-flow green"></path>
                        <path d="M700 90 H560 V210 H474" class="trace-bg"></path><path d="M700 90 H560 V210 H474" class="trace-flow blue"></path>
                        <path d="M740 160 H580 V230 H474" class="trace-bg"></path><path d="M740 160 H580 V230 H474" class="trace-flow green"></path>
                        <path d="M720 250 H590 V250 H474" class="trace-bg"></path><path d="M720 250 H590 V250 H474" class="trace-flow red"></path>
                        <path d="M680 340 H570 V270 H474" class="trace-bg"></path><path d="M680 340 H570 V270 H474" class="trace-flow yellow"></path>
                    </g>
                    <rect x="330" y="190" width="140" height="100" rx="20" ry="20" fill="url(#chipGradient)" stroke="#222" stroke-width="3" filter="drop-shadow(0 0 6px rgba(0,0,0,0.8))"></rect>
                    <g>
                        <rect x="322" y="205" width="8" height="10" fill="url(#pinGradient)" rx="2"></rect>
                        <rect x="322" y="225" width="8" height="10" fill="url(#pinGradient)" rx="2"></rect>
                        <rect x="322" y="245" width="8" height="10" fill="url(#pinGradient)" rx="2"></rect>
                        <rect x="322" y="265" width="8" height="10" fill="url(#pinGradient)" rx="2"></rect>
                    </g>
                    <g>
                        <rect x="470" y="205" width="8" height="10" fill="url(#pinGradient)" rx="2"></rect>
                        <rect x="470" y="225" width="8" height="10" fill="url(#pinGradient)" rx="2"></rect>
                        <rect x="470" y="245" width="8" height="10" fill="url(#pinGradient)" rx="2"></rect>
                        <rect x="470" y="265" width="8" height="10" fill="url(#pinGradient)" rx="2"></rect>
                    </g>
                    <text x="400" y="240" font-family="Arial, sans-serif" font-size="22" fill="url(#textGradient)" text-anchor="middle" alignment-baseline="middle">Loading</text>
                    <circle cx="100" cy="100" r="5" fill="black"></circle><circle cx="80" cy="180" r="5" fill="black"></circle><circle cx="60" cy="260" r="5" fill="black"></circle><circle cx="100" cy="350" r="5" fill="black"></circle>
                    <circle cx="700" cy="90" r="5" fill="black"></circle><circle cx="740" cy="160" r="5" fill="black"></circle><circle cx="720" cy="250" r="5" fill="black"></circle><circle cx="680" cy="340" r="5" fill="black"></circle>
                </svg>
            </div>
        </div>
    </div>
    <style>
        .trace-bg { stroke: #333; stroke-width: 1.8; fill: none; }
        .trace-flow { stroke-width: 1.8; fill: none; stroke-dasharray: 40 400; stroke-dashoffset: 438; filter: drop-shadow(0 0 6px currentColor); animation: flow 3s cubic-bezier(0.5, 0, 0.9, 1) infinite; }
        .yellow { stroke: #ffea00; color: #ffea00; } .blue { stroke: #00ccff; color: #00ccff; } .green { stroke: #00ff15; color: #00ff15; } .purple { stroke: #9900ff; color: #9900ff; } .red { stroke: #ff3300; color: #ff3300; }
        @keyframes flow { to { stroke-dashoffset: 0; } }
    </style>
    <script>
        function handleAuth(e) {
            e.preventDefault();
            const loader = document.getElementById('splash-loader');
            loader.style.display = 'flex';
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2500); // Wait 2.5s while loading animation plays
        }
    </script>
    <script src="assets/js/login.js"></script>
</body>

</html>
